# Weissmann AI — Netlify configuration
# Production live on Netlify since 2026-07-22 (migrated from Webflow hosting).
# GitHub `master` auto-deploys here; Webflow is retained only as a DNS rollback.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Security headers are defined in public/_headers so they ship with the
# static output; redirects live in public/_redirects for the same reason.
